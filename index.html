<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guild Sim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>Guild Sim</h1>

    <div class="topbar">
      <div class="resource">Gold: <span id="gold">0</span></div>
      <div class="resource">Adventurers: <span id="count">0</span> / <span id="max">0</span></div>
    </div>

    <!-- Top-level view switcher: the Adventurers menu and the Dungeons menu
         live side by side, one shown at a time. -->
    <nav class="viewnav" aria-label="Main menu">
      <button id="navAdventurers" type="button" class="viewnav-btn active" data-view="adventurers">Adventurers</button>
      <button id="navDungeons" type="button" class="viewnav-btn" data-view="dungeons">Dungeons</button>
    </nav>

    <!-- ===== Adventurers view ===== -->
    <section class="view" id="adventurersView" aria-label="Adventurers">
    <section class="roster" id="roster" aria-label="Roster">
      <!-- adventurer boxes are rendered here -->
    </section>

    <button id="hire" type="button" class="hire-btn">Hire Newbie (1000g)</button>

    <section class="statsheet" id="statsheet" aria-label="Stat sheet">
      <input
        id="name"
        class="name-box"
        type="text"
        maxlength="20"
        placeholder="Adventurer name"
        autocomplete="off"
      >
      <div class="meta">
        <div class="class-label">Class: <span id="class">—</span></div>
        <div class="level">Lv <span id="level">1</span></div>
      </div>
      <div class="xpbar" aria-label="Experience">
        <div class="xpbar-fill" id="xpFill"></div>
        <span class="xpbar-text" id="xpText">0 / 100 XP</span>
      </div>
      <div class="tabs" role="tablist" aria-label="Adventurer detail tabs">
        <button id="tabStats" type="button" class="tab active" data-tab="stats" role="tab">Stats</button>
        <button id="tabEquipment" type="button" class="tab" data-tab="equipment" role="tab">Equipment</button>
        <button id="tabInventory" type="button" class="tab" data-tab="inventory" role="tab">Inventory</button>
      </div>

      <div class="stats" id="stats" role="tabpanel" aria-label="Stats">
        <!-- stat rows are rendered here -->
      </div>

      <div class="equipment hidden" id="equipment" role="tabpanel" aria-label="Equipment">
        <!-- equipment slots are rendered here -->
      </div>

      <div class="inventory hidden" id="inventoryPanel" role="tabpanel" aria-label="Inventory">
        <p class="inv-caption"><span id="invUnlocked">4</span> / 40 slots</p>
        <div class="inv-grid" id="inventory">
          <!-- inventory cells are rendered here -->
        </div>
      </div>
    </section>

    <p class="empty-hint" id="emptyHint">No adventurer selected — hire one to get started.</p>
    </section>

    <!-- ===== Dungeons view ===== -->
    <section class="view hidden" id="dungeonsView" aria-label="Dungeons">
      <!-- Dungeon list: the picker of available dungeons. -->
      <div class="dungeon-list" id="dungeonList">
        <!-- dungeon cards are rendered here -->
      </div>

      <!-- Dungeon detail: opened by clicking a dungeon. Holds the Enter button
           and the enemy list, which is the main info on the page. -->
      <div class="dungeon-detail hidden" id="dungeonDetail">
        <button id="dungeonBack" type="button" class="back-btn">← Dungeons</button>
        <div class="dungeon-head">
          <h2 id="dungeonName">Dungeon</h2>
          <p class="dungeon-rec" id="dungeonRec">Recommended Lv 1–50</p>
        </div>
        <button id="dungeonEnter" type="button" class="enter-btn">Enter</button>
        <p class="enter-note hidden" id="enterNote"></p>
        <h3 class="enemy-heading">Enemies</h3>
        <div class="enemy-list" id="enemyList">
          <!-- enemy entries are rendered here -->
        </div>
      </div>

      <!-- Enemy detail: opened by clicking an enemy. Shows its statline and a
           button to copy the name + stats. -->
      <div class="enemy-detail hidden" id="enemyDetail">
        <button id="enemyBack" type="button" class="back-btn">← Back</button>
        <h2 id="enemyName">Enemy</h2>
        <div class="stats" id="enemyStats">
          <!-- enemy stat rows are rendered here -->
        </div>
        <button id="enemyCopy" type="button" class="copy-btn">Copy name &amp; stats</button>
      </div>

      <!-- Battle screen: the autobattler plays out here after Enter. -->
      <div class="battle hidden" id="battleScreen">
        <button id="battleBack" type="button" class="back-btn">← Leave</button>
        <h2 id="battleTitle">Battle</h2>
        <p class="battle-result hidden" id="battleResult"></p>
        <div class="battle-field">
          <div class="battle-column">
            <h3 class="battle-side-label">Party</h3>
            <div class="battle-side" id="battleParty"></div>
          </div>
          <div class="battle-column">
            <h3 class="battle-side-label">Enemies</h3>
            <div class="battle-side" id="battleEnemies"></div>
          </div>
        </div>
        <div class="battle-log" id="battleLog" aria-label="Battle log"></div>
      </div>
    </section>
  </main>

  <!-- Class picker: shown on every hire. Choice is permanent. -->
  <div class="modal-overlay hidden" id="classModal" role="dialog" aria-modal="true" aria-label="Choose a class">
    <div class="modal">
      <h2 id="classModalTitle">Choose a Class</h2>
      <p class="modal-sub">Pick a class for your newbie. This choice is permanent.</p>
      <div class="class-choices" id="classChoices">
        <!-- class buttons are rendered here -->
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
