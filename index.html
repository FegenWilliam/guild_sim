<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guild Sim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>Guild Sim</h1>

    <div class="topbar">
      <div class="resource">Gold: <span id="gold">0</span></div>
      <div class="resource">Adventurers: <span id="count">0</span> / <span id="max">0</span></div>
    </div>

    <section class="roster" id="roster" aria-label="Roster">
      <!-- adventurer boxes are rendered here -->
    </section>

    <button id="hire" type="button" class="hire-btn">Hire Newbie (1000g)</button>

    <section class="statsheet" id="statsheet" aria-label="Stat sheet">
      <input
        id="name"
        class="name-box"
        type="text"
        maxlength="20"
        placeholder="Adventurer name"
        autocomplete="off"
      >
      <div class="meta">
        <div class="class-label">Class: <span id="class">—</span></div>
        <div class="level">Lv <span id="level">1</span></div>
      </div>
      <div class="xpbar" aria-label="Experience">
        <div class="xpbar-fill" id="xpFill"></div>
        <span class="xpbar-text" id="xpText">0 / 100 XP</span>
      </div>
      <div class="stats" id="stats">
        <!-- stat rows are rendered here -->
      </div>
    </section>

    <p class="empty-hint" id="emptyHint">No adventurer selected — hire one to get started.</p>
  </main>

  <!-- Class picker: shown on first launch and every hire. Choice is permanent. -->
  <div class="modal-overlay hidden" id="classModal" role="dialog" aria-modal="true" aria-label="Choose a class">
    <div class="modal">
      <h2 id="classModalTitle">Choose a Class</h2>
      <p class="modal-sub">Pick a class for your newbie. This choice is permanent.</p>
      <div class="class-choices" id="classChoices">
        <!-- class buttons are rendered here -->
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
