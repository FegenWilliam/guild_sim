<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guild Sim</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>Guild Sim</h1>

    <div class="topbar">
      <div class="resource">Gold: <span id="gold">0</span></div>
      <div class="resource">Adventurers: <span id="count">0</span> / <span id="max">0</span></div>
    </div>

    <section class="roster" id="roster" aria-label="Roster">
      <!-- adventurer boxes are rendered here -->
    </section>

    <button id="hire" type="button" class="hire-btn">Hire Newbie (1000g)</button>

    <section class="statsheet" id="statsheet" aria-label="Stat sheet">
      <input
        id="name"
        class="name-box"
        type="text"
        maxlength="20"
        placeholder="Adventurer name"
        autocomplete="off"
      >
      <div class="meta">
        <label class="class-picker">
          Class
          <select id="class">
            <!-- class options are populated in game.js -->
          </select>
        </label>
        <div class="level">
          Lv <span id="level">1</span>
          <button id="levelUp" type="button" class="mini-btn">Level +</button>
        </div>
      </div>
      <div class="stats" id="stats">
        <!-- stat rows are rendered here -->
      </div>
    </section>

    <p class="empty-hint" id="emptyHint">No adventurer selected — hire one to get started.</p>
  </main>

  <script src="game.js"></script>
</body>
</html>
